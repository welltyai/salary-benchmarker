// ─── Gauge Component (SVG arc) ──────────────────────────────────────
function GaugeChart({ data, userSalary }) {
  const min = data.p25 * 0.7;
  const max = data.p90 * 1.15;
  const clampedSalary = Math.max(min, Math.min(max, userSalary || data.p50));
  const pct = ((clampedSalary - min) / (max - min)) * 100;

  const getPercentileLabel = () => {
    if (!userSalary) return null;
    if (userSalary < data.p25) return { label: "Below 25th", color: "#f87171" };
    if (userSalary < data.p50) return { label: "25th-50th", color: "#fb923c" };
    if (userSalary < data.p75) return { label: "50th-75th", color: "#a3e635" };
    if (userSalary < data.p90) return { label: "75th-90th", color: "#34d399" };
    return { label: "Above 90th", color: "#22d3ee" };
  };

  const percentile = getPercentileLabel();

  // Arc math
  const cx = 160, cy = 140, r = 110;
  const startAngle = Math.PI;
  const endAngle = 0;

  const arcPath = (startPct, endPct, radius) => {
    const a1 = startAngle + (endAngle - startAngle) * (startPct / 100);
    const a2 = startAngle + (endAngle - startAngle) * (endPct / 100);
    const x1 = cx + radius * Math.cos(a1);
    const y1 = cy - radius * Math.sin(a1);
    const x2 = cx + radius * Math.cos(a2);
    const y2 = cy - radius * Math.sin(a2);
    const large = a2 - a1 > Math.PI ? 1 : 0;
    return `M ${x1} ${y1} A ${radius} ${radius} 0 ${large} 0 ${x2} ${y2}`;
  };

  const needleAngle = startAngle + (endAngle - startAngle) * (pct / 100);
  const needleLen = 85;
  const nx = cx + needleLen * Math.cos(needleAngle);
  const ny = cy - needleLen * Math.sin(needleAngle);

  const zones = [
    { from: 0, to: ((data.p25 - min) / (max - min)) * 100, color: "#f87171" },
    { from: ((data.p25 - min) / (max - min)) * 100, to: ((data.p50 - min) / (max - min)) * 100, color: "#fb923c" },
    { from: ((data.p50 - min) / (max - min)) * 100, to: ((data.p75 - min) / (max - min)) * 100, color: "#a3e635" },
    { from: ((data.p75 - min) / (max - min)) * 100, to: ((data.p90 - min) / (max - min)) * 100, color: "#34d399" },
    { from: ((data.p90 - min) / (max - min)) * 100, to: 100, color: "#22d3ee" },
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "8px" }}>
      <svg width="320" height="180" viewBox="0 0 320 180">
        {/* Background arc */}
        <path d={arcPath(0, 100, r)} fill="none" stroke="#1e293b" strokeWidth="28" strokeLinecap="round" />
        {/* Zone arcs */}
        {zones.map((z, i) => (
          <path key={i} d={arcPath(z.from, z.to, r)} fill="none" stroke={z.color} strokeWidth="24" opacity="0.35" />
        ))}
        {/* Active arc up to needle */}
        {userSalary && (
          <path d={arcPath(0, pct, r)} fill="none" stroke={percentile?.color || "#a3e635"} strokeWidth="24" strokeLinecap="round" style={{ filter: `drop-shadow(0 0 8px ${percentile?.color}55)` }} />
        )}
        {/* Needle */}
        <line x1={cx} y1={cy} x2={nx} y2={ny} stroke="#f8fafc" strokeWidth="3" strokeLinecap="round" style={{ filter: "drop-shadow(0 2px 4px rgba(0,0,0,0.5))", transition: "all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)" }} />
        <circle cx={cx} cy={cy} r="8" fill="#0f172a" stroke="#f8fafc" strokeWidth="3" />
        {/* Center value */}
        <text x={cx} y={cy + 36} textAnchor="middle" fill="#f8fafc" fontSize="18" fontWeight="700" fontFamily="'JetBrains Mono', monospace">
          {userSalary ? fmtFull(userSalary) : fmtFull(data.p50)}
        </text>
        <text x={cx} y={cy + 54} textAnchor="middle" fill="#94a3b8" fontSize="11" fontFamily="'JetBrains Mono', monospace">
          {userSalary ? "Your Salary" : "Median (P50)"}
        </text>
        {/* Min / Max labels */}
        <text x="30" y={cy + 10} fill="#64748b" fontSize="10" fontFamily="'JetBrains Mono', monospace">{fmt(min)}</text>
        <text x="264" y={cy + 10} fill="#64748b" fontSize="10" fontFamily="'JetBrains Mono', monospace">{fmt(max)}</text>
      </svg>
      {percentile && userSalary && (
        <div style={{
          display: "inline-flex", alignItems: "center", gap: "6px",
          padding: "6px 16px", borderRadius: "20px",
          background: `${percentile.color}18`, border: `1px solid ${percentile.color}40`,
        }}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: percentile.color }} />
          <span style={{ color: percentile.color, fontSize: "13px", fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>
            {percentile.label} Percentile
          </span>
        </div>
      )}
    </div>
  );
}

// ─── Percentile Bar Chart ────────────────────────────────────────
function PercentileChart({ data, userSalary }) {
  const chartData = [
    { name: "25th", value: data.p25, fill: "#f87171" },
    { name: "50th", value: data.p50, fill: "#fb923c" },
    { name: "75th", value: data.p75, fill: "#a3e635" },
    { name: "90th", value: data.p90, fill: "#34d399" },
  ];

  const CustomTooltip = ({ active, payload }) => {
    if (active && payload?.length) {
      return (
        <div style={{
          background: "#0f172a", border: "1px solid #334155", borderRadius: "8px",
          padding: "10px 14px", fontFamily: "'JetBrains Mono', monospace",
        }}>
          <p style={{ color: "#94a3b8", fontSize: "11px", margin: 0 }}>{payload[0].payload.name} Percentile</p>
          <p style={{ color: "#f8fafc", fontSize: "15px", fontWeight: 700, margin: "4px 0 0" }}>{fmtFull(payload[0].value)}</p>
        </div>
      );
    }
    return null;
  };

  return (
    <div style={{ width: "100%", height: 220 }}>
      <ResponsiveContainer>
        <BarChart data={chartData} barCategoryGap="25%" margin={{ top: 20, right: 10, bottom: 5, left: 10 }}>
          <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
          <XAxis
            dataKey="name" tick={{ fill: "#94a3b8", fontSize: 12, fontFamily: "'JetBrains Mono', monospace" }}
            axisLine={{ stroke: "#334155" }} tickLine={false}
          />
          <YAxis
            tick={{ fill: "#64748b", fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}
            axisLine={false} tickLine={false} tickFormatter={fmt} width={55}
          />
          <Tooltip content={<CustomTooltip />} cursor={{ fill: "#ffffff08" }} />
          {userSalary && (
            <ReferenceLine

            />
          )}
          <Bar dataKey="value" radius={[6, 6, 0, 0]} maxBarSize={56}>
            {chartData.map((entry, i) => (
              <Cell key={i} fill={entry.fill} fillOpacity={0.75} />
            ))}
          </Bar>
        </BarChart>
      </ResponsiveContainer>
    </div>
  );
}

// ─── Pill Selector ───────────────────────────────────────────────
function PillSelector({ options, value, onChange, columns = 3 }) {
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: `repeat(${columns}, 1fr)`,
      gap: "8px",
    }}>
      {options.map((opt) => {
        const active = opt === value;
        return (
          <button
            key={opt}
            onClick={() => onChange(opt)}
            style={{
              padding: "10px 8px",
              borderRadius: "10px",
              border: active ? "1.5px solid #a3e635" : "1.5px solid #1e293b",
              background: active ? "#a3e63512" : "#0f172a",
              color: active ? "#a3e635" : "#94a3b8",
              fontSize: "13px",
              fontWeight: active ? 600 : 400,
              fontFamily: "'JetBrains Mono', monospace",
              cursor: "pointer",
              transition: "all 0.2s ease",
              textAlign: "center",
              whiteSpace: "nowrap",
              overflow: "hidden",
              textOverflow: "ellipsis",
            }}
          >
            {opt}
          </button>
        );
      })}
    </div>
  );
}

// ─── Insight Cards ───────────────────────────────────────────────
function InsightCards({ data, industry, rank, userSalary }) {
  const midpoint = (data.p25 + data.p75) / 2;
  const spread = data.p90 - data.p25;
  const spreadPct = ((spread / data.p50) * 100).toFixed(0);

  const cards = [
    {
      label: "Median Salary",
      value: fmtFull(data.p50),
      sub: `${industry} / ${rank}`,
      accent: "#fb923c",
    },
    {
      label: "Salary Range",
      value: `${fmt(data.p25)} - ${fmt(data.p90)}`,
      sub: `${spreadPct}% spread (P25 to P90)`,
      accent: "#a3e635",
    },
    {
      label: "Sweet Spot",
      value: fmtFull(midpoint),
      sub: "Midpoint between P25 and P75",
      accent: "#22d3ee",
    },
  ];

  if (userSalary) {
    const diff = userSalary - data.p50;
    const diffPct = ((diff / data.p50) * 100).toFixed(1);
    const above = diff >= 0;
    cards.push({
      label: "vs. Median",
      value: `${above ? "+" : ""}${diffPct}%`,
      sub: `${above ? "Above" : "Below"} market median by ${fmtFull(Math.abs(diff))}`,
      accent: above ? "#34d399" : "#f87171",
    });
  }

  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: userSalary ? "repeat(4, 1fr)" : "repeat(3, 1fr)",
      gap: "12px",
    }}>
      {cards.map((c, i) => (
        <div key={i} style={{
          background: "#0f172a",
          border: "1px solid #1e293b",
          borderRadius: "12px",
          padding: "16px",
          borderTop: `3px solid ${c.accent}`,
        }}>
          <div style={{ color: "#64748b", fontSize: "11px", fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase", letterSpacing: "0.05em" }}>
            {c.label}
          </div>
          <div style={{ color: "#f8fafc", fontSize: "18px", fontWeight: 700, fontFamily: "'JetBrains Mono', monospace", margin: "6px 0 4px" }}>
            {c.value}
          </div>
          <div style={{ color: "#64748b", fontSize: "11px", fontFamily: "'JetBrains Mono', monospace" }}>
            {c.sub}
          </div>
        </div>
      ))}
    </div>
  );
}

              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: "12px", fontWeight: 700,
            }}>3</div>
            <span style={{ fontSize: "14px", fontWeight: 600, color: "#e2e8f0", fontFamily: "'Space Grotesk', sans-serif" }}>
              Your Annual Salary
            </span>
            <span style={{ fontSize: "11px", color: "#475569", fontStyle: "italic" }}>(optional)</span>
          </div>
          <div style={{ display: "flex", gap: "12px", alignItems: "center" }}>
            <div style={{ position: "relative", flex: 1 }}>
              <span style={{
                position: "absolute", left: "14px", top: "50%", transform: "translateY(-50%)",
                color: "#64748b", fontSize: "14px", fontWeight: 600,
              }}>SGD</span>
              <input
                type="text"
                value={userSalary}
                onChange={handleSalaryInput}
                placeholder="e.g. 84,000"
                style={{
                  width: "100%",
                  padding: "12px 14px 12px 56px",
                  borderRadius: "10px",
                  border: "1.5px solid #1e293b",
                  background: "#0f172a",
                  color: "#f8fafc",
                  fontSize: "15px",
                  fontWeight: 600,
                  fontFamily: "'JetBrains Mono', monospace",
                  outline: "none",
                  transition: "border-color 0.2s ease",
                }}
                onFocus={(e) => e.target.style.borderColor = "#a3e635"}
                onBlur={(e) => e.target.style.borderColor = "#1e293b"}
              />
            </div>
            <button
              onClick={handleBenchmark}
              disabled={!industry || !rank}
              style={{
                padding: "12px 28px",
                borderRadius: "10px",
                border: "none",
                background: industry && rank ? "linear-gradient(135deg, #a3e635, #22d3ee)" : "#1e293b",
                color: industry && rank ? "#020617" : "#475569",
                fontSize: "14px",
                fontWeight: 700,
                fontFamily: "'Space Grotesk', sans-serif",
                cursor: industry && rank ? "pointer" : "not-allowed",
                transition: "all 0.2s ease",
                whiteSpace: "nowrap",
              }}
            >
              Benchmark
            </button>
          </div>
        </div>

        {/* Results */}
        {showResults && data && (
          <div style={{
            opacity: fadeIn ? 1 : 0,
            transform: fadeIn ? "translateY(0)" : "translateY(20px)",
            transition: "all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)",
          }}>
            {/* Divider */}
            <div style={{
              height: "1px",
              background: "linear-gradient(90deg, transparent, #334155, transparent)",
              margin: "8px 0 28px",
            }} />

            {/* Insight Cards */}
            <InsightCards data={data} industry={industry} rank={rank} userSalary={salaryNum} />

            {/* Charts row */}
            <div style={{
              display: "grid",
              gridTemplateColumns: "1fr 1fr",
              gap: "16px",
              marginTop: "20px",
            }}>
              {/* Gauge */}
              <div style={{
                background: "#0f172a",
                border: "1px solid #1e293b",
                borderRadius: "14px",
                padding: "20px",
              }}>
                <div style={{ fontSize: "12px", color: "#64748b", marginBottom: "8px", textTransform: "uppercase", letterSpacing: "0.06em" }}>
                  Salary Gauge
                </div>
                <GaugeChart data={data} userSalary={salaryNum} />
              </div>

              {/* Bar Chart */}
              <div style={{
                background: "#0f172a",
                border: "1px solid #1e293b",
                borderRadius: "14px",
                padding: "20px",
              }}>
                <div style={{ fontSize: "12px", color: "#64748b", marginBottom: "8px", textTransform: "uppercase", letterSpacing: "0.06em" }}>
                  Percentile Distribution
                </div>
                <PercentileChart data={data} userSalary={salaryNum} />
              </div>
            </div>

            {/* Footer note */}
            <div style={{
              marginTop: "20px",
              padding: "14px 18px",
              borderRadius: "10px",
              background: "#0f172a",
              border: "1px solid #1e293b",
              fontSize: "11px",
              color: "#475569",
              lineHeight: 1.6,
              fontFamily: "'JetBrains Mono', monospace",
            }}>
              Disclaimer: All figures are synthetic estimates based on publicly available Singapore salary surveys and market research.
              This tool is for informational purposes only and should not be used as the sole basis for compensation decisions.
              Actual salaries vary by company, experience, qualifications, and negotiation.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SalaryBenchmark />);
  </script>
</body>
</html>
